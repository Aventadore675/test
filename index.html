<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uber Frontend</title>
    <style>
        body { font-family: Arial, sans-serif; }
        .modal { display: none; position: fixed; z-index: 1; left: 0; top: 0; width: 100%; height: 100%; overflow: auto; background-color: rgb(0,0,0); background-color: rgba(0,0,0,0.4); }
        .modal-content { background-color: #fefefe; margin: 15% auto; padding: 20px; border: 1px solid #888; width: 80%; }
        .close { color: #aaa; float: right; font-size: 28px; font-weight: bold; }
        .close:hover, .close:focus { color: black; text-decoration: none; cursor: pointer; }
    </style>
</head>
<body>
    <h1>Uber - Rides and Delivery</h1>
    <button id="rideBtn">Request Ride</button>
    <button id="deliveryBtn">Request Delivery</button>

    <div id="rideModal" class="modal">
        <div class="modal-content">
            <span class="close" id="closeRideModal">&times;</span>
            <h2>Trip Details</h2>
            <p>Available options...</p>
            <p><strong>Pick-up:</strong> Location A</p>
            <p><strong>Drop-off:</strong> Location B</p>
            <p><strong>Estimated Cost:</strong> $15</p>
        </div>
    </div>

    <div id="deliveryModal" class="modal">
        <div class="modal-content">
            <span class="close" id="closeDeliveryModal">&times;</span>
            <h2>Delivery Options</h2>
            <p>Available delivery options...</p>
            <p><strong>Pick-up:</strong> Location C</p>
            <p><strong>Drop-off:</strong> Location D</p>
            <p><strong>Estimated Cost:</strong> $10</p>
        </div>
    </div>

    <script>
        var rideModal = document.getElementById("rideModal");
        var deliveryModal = document.getElementById("deliveryModal");

        document.getElementById("rideBtn").onclick = function() {
            rideModal.style.display = "block";
        };

        document.getElementById("deliveryBtn").onclick = function() {
            deliveryModal.style.display = "block";
        };

        document.getElementById("closeRideModal").onclick = function() {
            rideModal.style.display = "none";
        };

        document.getElementById("closeDeliveryModal").onclick = function() {
            deliveryModal.style.display = "none";
        };
    </script>
</body>
</html>
